name: shakedown
description: gapless playback of select grateful dead shows from archive.org
publish_to: 'none'
version: 1.1.69+169

environment:
  sdk: '^3.11.0'

workspace:
  - packages/shakedown_core
  - apps/gdar_mobile
  - apps/gdar_tv
  - apps/gdar_fruit

dependencies:
  shakedown_core:
    path: ./packages/shakedown_core
  flutter:
    sdk: flutter

  scrollable_positioned_list: ^0.3.8
  sliding_up_panel2: ^3.3.0+1
  marquee: ^2.2.3

  # For Audio Playback
  just_audio: ^0.10.5
  just_audio_background: ^0.0.1-beta.17
  audio_session: ^0.2.2

  # For Deep Linking / App Actions
  app_links: ^7.0.0

  # For State Management (Theme)
  provider: ^6.1.1

  # For saving the theme choice
  shared_preferences: ^2.2.2

  # For Date Formatting
  intl: ^0.20.2

  # For better logging
  logger: ^2.0.2

  # Material 3 Features
  dynamic_color: ^1.6.9
  animations: ^2.0.8

  cupertino_icons: ^1.0.2
  flutter_colorpicker: ^1.1.0
  http: ^1.2.1
  url_launcher: ^6.2.5
  flutter_rating_bar: ^4.0.1
  path_provider: ^2.1.5
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  package_info_plus: ^9.0.0
  crypto: ^3.0.3
  connectivity_plus: ^7.0.0
  in_app_update: ^4.2.5
  device_info_plus: ^12.3.0
  wakelock_plus: ^1.5.0

  # For screensaver visualizer game loop
  flame: ^1.36.0
  web: ^1.1.1
  lucide_icons: ^0.257.0
  google_fonts: ^8.0.2
  permission_handler: ^12.0.1

dev_dependencies:
  shakedown_core:
    path: ./packages/shakedown_core
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.4
  mocktail: ^1.0.4
  build_runner: ^2.4.8
  hive_ce_generator: ^1.11.1

flutter:
  uses-material-design: true

  assets:
    - packages/shakedown_core/assets/data/output.optimized_src.json
    - assets/images/

  shaders:
    - shaders/steal.frag

  fonts:
    - family: RockSalt
      fonts:
        - asset: fonts/RockSalt-Regular.ttf
          weight: 400
    - family: Caveat
      fonts:
        - asset: fonts/Caveat-Regular.ttf
    - family: Permanent Marker
      fonts:
        - asset: fonts/PermanentMarker-Regular.ttf
    - family: Inter
      fonts:
        - asset: fonts/Inter-Regular.ttf
          weight: 400
        - asset: fonts/Inter-Medium.ttf
          weight: 500
        - asset: fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: fonts/Inter-Bold.ttf
          weight: 700
        - asset: fonts/Inter-ExtraBold.ttf
          weight: 800
