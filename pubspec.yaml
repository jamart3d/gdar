name: gdar_root

environment:
  sdk: '^3.11.0'

workspace:
  - packages/shakedown_core
  - packages/screensaver_tv
  - packages/styles/*
  - apps/gdar_mobile
  - apps/gdar_tv
  - apps/gdar_web

dev_dependencies:
  melos: ^7.1.1
  shakedown_core:
    path: ./packages/shakedown_core
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.4
  mocktail: ^1.0.4
  build_runner: ^2.4.8
  hive_ce_generator: ^1.11.1

flutter:
  uses-material-design: true

melos:
  packages:
    - packages/**
    - apps/**
  command:
    bootstrap:
      usePubspecOverrides: true
  scripts:
    analyze:
      description: Run analysis in all packages/apps.
      run: melos exec -c 1 -- flutter analyze
    test:
      description: Run tests in all packages/apps.
      run: melos exec -c 1 --dir-exists=test --ignore="screensaver_tv" -- flutter test -j 1
    format:
      description: Check formatting across the workspace.
      run: dart format --set-exit-if-changed .
    clean:
      description: Clean all package/app build artifacts.
      run: melos exec -c 1 -- flutter clean
    icons:
      description: Regenerate launcher icons for all apps.
      run: melos exec -c 1 -- "flutter pub run flutter_launcher_icons:main"


