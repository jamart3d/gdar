name: gdar_root
#resolution: workspace

environment:
  sdk: '^3.11.0'

workspace:
  - packages/shakedown_core
  - apps/gdar_mobile
  - apps/gdar_tv
  - apps/gdar_fruit

workspace:
  - packages/shakedown_core

dev_dependencies:
  shakedown_core:
    path: ./packages/shakedown_core
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.4
  mocktail: ^1.0.4
  build_runner: ^2.4.8
  hive_ce_generator: ^1.11.1

flutter:
  uses-material-design: true

  assets:
    - packages/shakedown_core/assets/data/output.optimized_src.json
    - assets/images/

  shaders:
    - shaders/steal.frag

  fonts:
    - family: RockSalt
      fonts:
        - asset: fonts/RockSalt-Regular.ttf
          weight: 400
    - family: Caveat
      fonts:
        - asset: fonts/Caveat-Regular.ttf
    - family: Permanent Marker
      fonts:
        - asset: fonts/PermanentMarker-Regular.ttf
    - family: Inter
      fonts:
        - asset: fonts/Inter-Regular.ttf
          weight: 400
        - asset: fonts/Inter-Medium.ttf
          weight: 500
        - asset: fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: fonts/Inter-Bold.ttf
          weight: 700
        - asset: fonts/Inter-ExtraBold.ttf
          weight: 800
