name: gdar_root

environment:
  sdk: '^3.11.0'

workspace:
  - packages/shakedown_core
  - packages/screensaver_tv
  - packages/styles/gdar_android
  - packages/styles/gdar_fruit
  - apps/gdar_mobile
  - apps/gdar_tv
  - apps/gdar_web

dev_dependencies:
  melos: 7.5.0
  shakedown_core:
    path: ./packages/shakedown_core
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: 5.6.4
  mocktail: ^1.0.4
  build_runner: 2.13.1
  hive_ce_generator: ^1.11.1

flutter:
  uses-material-design: true

melos:
  packages:
    - packages/**
    - apps/**
  command:
    bootstrap:
      usePubspecOverrides: true
  scripts:
    analyze:
      description: Run fast workspace-wide analysis.
      run: melos exec --concurrency 2 -- dart analyze .
    test:
      description: Run tests in all packages/apps with concurrency.
      run: melos exec -c 2 --dir-exists=test --ignore="screensaver_tv" -- flutter test
    fix:
      description: Apply automated fixes across the workspace.
      run: melos exec -c 2 -- dart fix --apply
    format:
      description: Check formatting across the workspace.
      run: melos exec -c 2 -- dart format --set-exit-if-changed .
    clean:
      description: Clean all package/app build artifacts.
      run: melos exec -c 1 -- flutter clean
    icons:
      description: Regenerate launcher icons for all apps.
      run: melos exec -c 1 -- "flutter pub run flutter_launcher_icons:main"
dependencies:
  logger: 2.7.0
  shared_preferences: 2.5.5


