<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="play grateful dead archive org mp3">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Shakedown">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>Shakedown</title>
  <link rel="manifest" href="manifest.json">
</head>

<body>
  <!-- Global Web Error Log (gdarDumpErrors / gdarClearErrors) -->
  <script src="web_error_logger.js"></script>  <!-- 0. Master Logging Registry (Control debug output) -->
  <script src="audio_logger.js"></script>
  <script>
    // Global Engine Tracker (Diagnostic)
    (function() {
      let _currentEngine = null;
      Object.defineProperty(window, '_gdarAudio', {
        get: function() { return _currentEngine; },
        set: function(val) {
          console.log('%c[Engine Tracker] window._gdarAudio being set to:', 'color: #ff00ff; font-weight: bold;', val?.engineType || 'Unknown');
          if (val && !val.engineType) console.trace();
          _currentEngine = val;
        },
        configurable: true
      });

      // PWA Branding Sync
      window.updateThemeBranding = function(themeColor, bgColor) {
        console.log('[Branding Sync] Updating to:', themeColor, bgColor);
        let themeMeta = document.querySelector('meta[name="theme-color"]');
        if (!themeMeta) {
          themeMeta = document.createElement('meta');
          themeMeta.name = 'theme-color';
          document.head.appendChild(themeMeta);
        }
        themeMeta.setAttribute('content', themeColor);

        // Update iOS status bar
        let appleMeta = document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]');
        if (appleMeta) {
          appleMeta.setAttribute('content', (themeColor === '#000000' || themeColor === 'black') ? 'black' : 'default');
        }

        // Apply background color to body to prevent flashes
        document.body.style.backgroundColor = bgColor;
      };
    })();
  </script>
  <!-- 1. Mobile HTML5 streaming engine (pure) -->
  <script src="html5_audio_engine.js"></script>
  <!-- 1.1 Orchestrated HTML5 engine (Hybrid background) -->
  <script src="hybrid_html5_engine.js"></script>
  <!-- 2. Desktop GDAR Web Audio API engine (AudioBufferSourceNode, 0ms gapless) -->
  <script src="gapless_audio_engine.js"></script>
  <!-- 3. Passive HTML5 Audio engine (background persistence) -->
  <script src="passive_audio_engine.js"></script>
  <!-- 4. Hybrid Web Audio engine (foreground gapless + background passive) -->
  <script src="hybrid_audio_engine.js"></script>
  <!-- 5. Audio Heartbeat (Lock Web Audio into background memory on iOS/Android) -->
  <script src="audio_heartbeat.js"></script>
  <!-- 6. Hybrid dispatcher: auto-selects strategy and assigns window._gdarAudio -->
  <script src="hybrid_init.js"></script>
  <!-- Firebase Config (Gitignored) -->
  <script src="firebase-config.js"></script>
  <!-- Firebase SDKs -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";

    // Initialize Firebase
    if (typeof firebaseConfig !== 'undefined') {
      const app = initializeApp(firebaseConfig);
      const analytics = getAnalytics(app);
    } else {
      console.warn("Firebase config not found. Analytics disabled.");
    }
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
