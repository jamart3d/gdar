name: gdar_web
publish_to: none
version: 1.3.25+235
environment:
  sdk: '^3.11.0'
resolution: workspace
dependencies:
  shakedown_core:
    path: ../../packages/shakedown_core
  gdar_android:
    path: ../../packages/styles/gdar_android
  gdar_fruit:
    path: ../../packages/styles/gdar_fruit
  flutter:
    sdk: flutter
  web: ^1.1.0
  lucide_icons: ^0.257.0
  sliding_up_panel2: ^3.3.0+1
  scrollable_positioned_list: ^0.3.8
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  provider: ^6.1.5
  intl: ^0.20.2
  package_info_plus: ^8.3.1
  just_audio: ^0.10.5
  shared_preferences: ^2.3.2
  logger: ^2.4.0
  url_launcher: ^6.3.1
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: '^6.0.0'
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "../../packages/shakedown_core/assets/images/gdar_icon_foregroup.png"
  web:
    generate: true
    background_color: "#000000"
    theme_color: "#000000"

flutter:
  uses-material-design: true

