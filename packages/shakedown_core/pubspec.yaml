name: shakedown_core
description: Core models and infrastructure for Shakedown apps.
version: 1.0.0
publish_to: 'none'
resolution: workspace

environment:
  sdk: '^3.11.0'

dependencies:
  flutter:
    sdk: flutter
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  crypto: ^3.0.3
  intl: ^0.20.2
  app_links: ^7.0.0
  lucide_icons: ^0.257.0
  provider: ^6.1.5
  just_audio: ^0.10.5
  just_audio_background: ^0.0.1-beta.17
  logger: ^2.4.0
  shared_preferences: ^2.3.2
  wakelock_plus: ^1.2.8
  scrollable_positioned_list: ^0.3.8
  sliding_up_panel: ^2.0.0+1
  path_provider: ^2.1.5
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  hive_ce_generator: ^1.11.1

flutter:
  assets:
    - assets/data/output.optimized_src.json
