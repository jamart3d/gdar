name: shakedown_core
description: Core models and infrastructure for Shakedown apps.
version: 1.0.0
publish_to: 'none'
resolution: workspace

environment:
  sdk: '^3.11.0'

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.16.0
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  crypto: ^3.0.3
  intl: ^0.20.2
  app_links: ^7.0.0
  lucide_icons: ^0.257.0
  provider: ^6.1.5
  just_audio: ^0.10.5
  just_audio_background: ^0.0.1-beta.17
  logger: ^2.4.0
  connectivity_plus: ^6.1.1
  in_app_update: ^4.2.1
  permission_handler: ^11.3.0
  marquee: ^2.2.3
  flutter_rating_bar: ^4.0.1
  flutter_colorpicker: ^1.1.0
  device_info_plus: ^11.2.2
  package_info_plus: ^8.3.1
  shared_preferences: ^2.3.2
  wakelock_plus: ^1.2.8
  scrollable_positioned_list: ^0.3.8
  path_provider: ^2.1.5
  path: ^1.9.0
  url_launcher: ^6.3.1
  http: ^1.2.1
  web: ^1.1.0
  sliding_up_panel2: ^3.3.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  mockito: ^5.4.4
  mocktail: ^1.0.4
  hive_ce_generator: ^1.11.1

flutter:
  assets:
    - assets/data/output.optimized_src.json
    - assets/images/

  fonts:
    - family: RockSalt
      fonts:
        - asset: assets/fonts/RockSalt-Regular.ttf
          weight: 400
    - family: Caveat
      fonts:
        - asset: assets/fonts/Caveat-Regular.ttf
    - family: Permanent Marker
      fonts:
        - asset: assets/fonts/PermanentMarker-Regular.ttf
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800
