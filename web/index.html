<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="play garteful dead archive org mp3">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Shakedown">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>Shakedown</title>
  <link rel="manifest" href="manifest.json?v=1.1.18">
</head>

<body>
  <!-- 1. Mobile HTML5 streaming engine (dual HTMLAudioElement) -->
  <script src="html5_audio_engine.js"></script>
  <!-- 2. Desktop GDAR Web Audio API engine (AudioBufferSourceNode, 0ms gapless) -->
  <script src="gapless_audio_engine.js"></script>
  <!-- 3. Hybrid dispatcher: auto-selects strategy and assigns window._gdarAudio -->
  <script src="hybrid_init.js"></script>
  <!-- Firebase Config (Gitignored) -->
  <script src="firebase-config.js"></script>
  <!-- Firebase SDKs -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";

    // Initialize Firebase
    if (typeof firebaseConfig !== 'undefined') {
      const app = initializeApp(firebaseConfig);
      const analytics = getAnalytics(app);
    } else {
      console.warn("Firebase config not found. Analytics disabled.");
    }
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
