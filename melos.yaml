name: gdar_workspace
packages:
  - packages/**
  - apps/**
command:
  bootstrap:
    usePubspecOverrides: true

scripts:
  analyze:
    description: Run analysis in all packages/apps.
    run: melos exec -c 1 -- flutter analyze
  test:
    description: Run tests in all packages/apps.
    run: melos exec -c 1 -- flutter test
  format:
    description: Check formatting across the workspace.
    run: dart format --set-exit-if-changed .
  clean:
    description: Clean all package/app build artifacts.
    run: melos exec -c 1 -- flutter clean
  icons:
    description: Regenerate launcher icons for all apps.
    run: melos exec -c 1 -- "flutter pub run flutter_launcher_icons:main"
