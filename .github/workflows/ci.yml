name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap Workspace
        run: |
          export PATH="$PATH:$HOME/.pub-cache/bin"
          melos bootstrap

      - name: Format Check
        run: |
          export PATH="$PATH:$HOME/.pub-cache/bin"
          melos run format

      - name: Analyze
        run: |
          export PATH="$PATH:$HOME/.pub-cache/bin"
          melos run analyze

      - name: Test
        run: |
          export PATH="$PATH:$HOME/.pub-cache/bin"
          melos run test

      - name: Test Root Scripts
        run: flutter test test/scripts

      - name: Build Web
        working-directory: apps/gdar_web
        run: flutter build web --release

      - name: Verify Web Build Contracts
        run: dart run scripts/verify_web_build_contracts.dart apps/gdar_web/build/web

      - name: Verify Clean Worktree
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git status --porcelain
            exit 1
          fi
